apiVersion: batch/v1
kind: Job
metadata:
  name: bookstore-api-tests
spec:
  ttlSecondsAfterFinished: 30

  template:
    metadata:
      labels:
        app: bookstore-api-tests
    spec:
      restartPolicy: Never
      containers:
        - name: api-tests
          image: avenga-bookstore-api-tests:latest
          imagePullPolicy: Never